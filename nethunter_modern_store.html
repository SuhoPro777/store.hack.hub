<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetHunter Store</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

header{
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    position: sticky;
    top:0;
}

.search{
    margin:20px auto;
    display:flex;
    justify-content:center;
}

.search input{
    width:80%;
    max-width:400px;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px);
    background: rgba(0,255,150,0.1);
}

.button{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background: #00ff99;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.button:hover{
    background:#00cc77;
}

footer{
    text-align:center;
    padding:20px;
    opacity:0.6;
    font-size:12px;
}
</style>
</head>
<body>

<header>⚡ NetHunter Modern Store</header>

<div class="search">
<input type="text" placeholder="Search APK..." onkeyup="searchApps(this.value)">
</div>

<div class="container" id="apps">

<div class="card">
<h3>BusyBox</h3>
<a class="button" href="https://drive.google.com/uc?export=download&id=1hVOrO2BZpHeUSoU5rOoJFWSWnq4tHtmJ">Download</a>
</div>

<div class="card">
<h3>NetHunter KeX</h3>
<a class="button" href="https://drive.google.com/uc?export=download&id=1k6MQx70k8WeWjX6qMdqHDWUfIM3LwXEc">Download</a>
</div>

<div class="card">
<h3>NetHunter Terminal</h3>
<a class="button" href="https://drive.google.com/uc?export=download&id=1PjAwssyDuiGJn25vVPTVepEfoUjNhyL9">Download</a>
</div>

<div class="card">
<h3>NetHunter Store</h3>
<a class="button" href="https://drive.google.com/uc?export=download&id=12ohVwgicdnOfx8C6IHuQUNUNHw6yt5Mo">Download</a>
</div>

</div>

<footer>Made for APK downloads • Simple & Fast</footer>

<script>
function searchApps(value){
    let cards = document.querySelectorAll('.card');
    cards.forEach(c=>{
        if(c.innerText.toLowerCase().includes(value.toLowerCase())){
            c.style.display='block';
        }else{
            c.style.display='none';
        }
    });
}
</script>

</body>
</html>
